<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>LuxeCarry Bags</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>LuxeCarry Bags</h1>

    <div class="cart">
      🛒 Cart: <span id="cart-count">0</span>
    </div>
  </header>

  <section class="products">

    <!-- Product 1 -->
    <div class="product">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Backpack">

      <h2>Classic Backpack</h2>

      <p class="price">₱1,500</p>

      <button onclick="addToCart()">
        Add to Cart
      </button>
    </div>

    <!-- Product 2 -->
    <div class="product">
      <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3" alt="Handbag">

      <h2>Luxury Handbag</h2>

      <p class="price">₱2,800</p>

      <button onclick="addToCart()">
        Add to Cart
      </button>
    </div>

    <!-- Product 3 -->
    <div class="product">
      <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b" alt="Travel Bag">

      <h2>Travel Duffel Bag</h2>

      <p class="price">₱3,200</p>

      <button onclick="addToCart()">
        Add to Cart
      </button>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
